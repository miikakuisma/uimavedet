<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#122E36">
<title>Uimavedet · Helsingin seutu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <p class="kicker">Helsingin seutu</p>
    <h1>Uimavedet</h1>
    <p class="updated" id="updated">&nbsp;</p>
  </header>
</div>

<nav class="controls" id="controls" hidden>
  <div class="controls-inner">
    <div class="seg" id="cities" role="group" aria-label="Suodata kaupungin mukaan">
      <button data-city="all" aria-pressed="true">Kaikki</button>
      <button data-city="Helsinki" aria-pressed="false">Helsinki</button>
      <button data-city="Espoo" aria-pressed="false">Espoo</button>
      <button data-city="Vantaa" aria-pressed="false">Vantaa</button>
    </div>
    <label class="toggle">
      <input type="checkbox" id="hideAlgae">
      <span class="switch" aria-hidden="true"></span>
      <span>Piilota leväiset rannat</span>
      <span class="count" id="count"></span>
    </label>
  </div>
</nav>

<div class="wrap">
  <main id="list" aria-live="polite"></main>

  <footer id="footer" hidden>
    Lähde: <a href="https://api.hel.fi/servicemap/v2/" target="_blank" rel="noopener">Helsingin kaupungin Palvelukartta</a> ·
    havainnot uimarantakaudelta. Tarkista aina tilanne paikan päältä ennen uintia.
  </footer>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetName" hidden>
  <div class="sheet-top">
    <div class="sheet-grab" aria-hidden="true"></div>
    <button class="sheet-close" id="sheetClose" type="button" aria-label="Sulje">✕</button>
    <header class="sheet-head">
      <h2 class="sheet-name" id="sheetName"></h2>
      <p class="sheet-city" id="sheetCity"></p>
    </header>
  </div>
  <div class="sheet-body" id="sheetBody">
    <div class="sheet-map" id="sheetMap" hidden></div>
    <div class="sheet-status" id="sheetStatus"></div>
    <p class="sheet-desc" id="sheetDesc" hidden></p>
  </div>
  <div class="sheet-foot">
    <a class="sheet-route" id="sheetRoute" target="_blank" rel="noopener">Avaa reittiopas →</a>
  </div>
</section>

<script type="module" src="/src/main.js"></script>
</body>
</html>
