<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#122E36">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- translucent status bar lets the paper background show behind the clock instead of an opaque white bar -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Uimavedet | Helsingin seudun uimavesien tilanne yhdellä silmäyksellä.</title>
<link rel="icon" type="image/png" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-512.png">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="masthead-brand">
      <img class="masthead-logo" src="/icon-512.png" alt="" width="52" height="52">
      <div class="masthead-text">
        <h1>Uimavedet</h1>
      </div>
    </div>
  </header>
</div>

<nav class="controls" id="controls" hidden>
  <div class="controls-inner">
    <div class="seg" id="cities" role="group" aria-label="Suodata kaupungin mukaan">
      <button data-city="all" aria-pressed="true">Kaikki</button>
      <button data-city="Helsinki" aria-pressed="false">Helsinki</button>
      <button data-city="Espoo" aria-pressed="false">Espoo</button>
      <button data-city="Vantaa" aria-pressed="false">Vantaa</button>
      <button class="seg-search" id="searchBtn" type="button" aria-label="Hae rantaa" aria-expanded="false">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="2"/><path d="M13 13l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="searchbar" id="searchbar" hidden>
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="2"/><path d="M13 13l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="Hae rantaa…" aria-label="Hae rantaa">
      <button class="search-clear" id="searchClear" type="button" aria-label="Tyhjennä ja sulje haku">✕</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="subbar" id="subbar" hidden>
    <label class="toggle">
      <input type="checkbox" id="hideAlgae">
      <span class="switch" aria-hidden="true"></span>
      <span>Piilota leväiset rannat</span>
      <span class="count" id="count"></span>
    </label>
  </div>
  <main id="list" aria-live="polite"></main>
  <p class="updated" id="updated">&nbsp;</p>
  <footer id="footer" hidden>
    Lähde: <a href="https://api.hel.fi/servicemap/v2/" target="_blank" rel="noopener">Helsingin kaupungin Palvelukartta</a> ·
    havainnot uimarantakaudelta. Tarkista aina tilanne paikan päältä ennen uintia.
  </footer>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetName" hidden>
  <div class="sheet-top">
    <div class="sheet-grab" aria-hidden="true"></div>
    <button class="sheet-close" id="sheetClose" type="button" aria-label="Sulje">✕</button>
    <header class="sheet-head">
      <h2 class="sheet-name" id="sheetName"></h2>
      <p class="sheet-city" id="sheetCity"></p>
    </header>
  </div>
  <div class="sheet-body" id="sheetBody">
    <div class="sheet-map" id="sheetMap" hidden></div>
    <div class="sheet-status" id="sheetStatus"></div>
    <p class="sheet-desc" id="sheetDesc" hidden></p>
  </div>
  <div class="sheet-foot">
    <a class="sheet-route" id="sheetRoute" target="_blank" rel="noopener">Avaa reittiopas →</a>
  </div>
</section>

<script type="module" src="/src/main.js"></script>
</body>
</html>
